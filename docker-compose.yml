version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  public_bot:
    build: .
    command: python bots/public_bot.py
    depends_on:
      - redis
    env_file: .env

  worker:
    build: .
    command: python engine/worker.py
    depends_on:
      - redis
    env_file: .env

  private_bot:
    build: .
    command: python bots/private_bot.py
    depends_on:
      - redis
    env_file: .env

volumes:
  redis_data:
    driver: local
