version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  public_bot:
    build: .
    command: python bots/public_bot.py
    depends_on:
      - redis
    env_file: .env
    restart: unless-stopped

  worker:
    build: .
    command: python engine/worker.py
    depends_on:
      - redis
    env_file: .env
    restart: unless-stopped

  webhook_api:
    build: .
    command: uvicorn bots.webhook:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis
    env_file: .env
    restart: unless-stopped
    ports:
      - "8000:8000"

  private_bot:
    build: .
    command: python bots/private_bot.py
    depends_on:
      - redis
    env_file: .env
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
