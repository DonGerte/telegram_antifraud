apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: antifraud-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-production"
spec:
  tls:
  - hosts:
    - yourdomain.example.com
    secretName: antifraud-tls
  rules:
  - host: yourdomain.example.com
    http:
      paths:
      - path: /webhook
        pathType: Prefix
        backend:
          service:
            name: antifraud-webhook
            port:
              number: 8000
