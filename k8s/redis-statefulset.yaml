apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: antifraud-redis
  labels:
    app: antifraud
spec:
  serviceName: antifraud-redis
  replicas: 3
  selector:
    matchLabels:
      app: antifraud
      tier: redis
  template:
    metadata:
      labels:
        app: antifraud
        tier: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        args: ["--appendonly", "yes"]
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: antifraud-redis
  labels:
    app: antifraud
    tier: redis
spec:
  clusterIP: None
  ports:
  - port: 6379
    targetPort: 6379
